<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>INDI-GRADA | Journal & Stories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #eaeaea; scroll-behavior: smooth; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #c6a43f; border-radius: 4px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.8rem 5%; background: rgba(10, 10, 10, 0.92); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(198, 164, 63, 0.2); }
        .logo { font-size: 1.9rem; font-weight: 700; letter-spacing: 3px; background: linear-gradient(135deg, #fff, #c6a43f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 2.5rem; font-weight: 500; }
        .nav-links a { color: #ddd; text-decoration: none; transition: 0.3s; font-size: 0.95rem; }
        .nav-links a:hover, .nav-links a.active { color: #c6a43f; }
        .nav-icons i { margin-left: 1.2rem; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .nav-icons i:hover { color: #c6a43f; }
        .page-header { text-align: center; padding: 4rem 5% 2rem; }
        .page-header h1 { font-size: 3rem; font-weight: 600; background: linear-gradient(135deg, #fff, #c6a43f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .journal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; padding: 2rem 5% 4rem; }
        .journal-card { background: #0f0f0f; border-radius: 24px; overflow: hidden; transition: 0.3s; }
        .journal-card:hover { transform: translateY(-6px); box-shadow: 0 12px 28px rgba(198,164,63,0.15); }
        .journal-img { height: 220px; background: linear-gradient(145deg, #1f1f1f, #0c0c0c); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .journal-content { padding: 1.5rem; }
        .journal-date { font-size: 0.75rem; color: #c6a43f; text-transform: uppercase; letter-spacing: 1px; }
        .journal-title { font-size: 1.3rem; margin: 0.5rem 0; font-weight: 600; }
        .journal-excerpt { color: #aaa; font-size: 0.9rem; line-height: 1.4; }
        .read-more { display: inline-block; margin-top: 1rem; color: #c6a43f; text-decoration: none; font-weight: 500; }
        footer { background: #020202; padding: 2.5rem 5%; text-align: center; border-top: 1px solid #1f1f1f; margin-top: 3rem; }
        .footer-links { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .footer-links a { color: #aaa; text-decoration: none; }
        @media (max-width: 768px) { .nav-links { display: none; } .page-header h1 { font-size: 2rem; } }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo">✦ INDI-GRADA</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="watches.html">Watches</a>
        <a href="jewelry.html">Jewelry</a>
        <a href="collections.html">Collections</a>
        <a href="journal.html" class="active">Journal</a>
    </div>
    <div class="nav-icons">
        <i class="fas fa-search"></i><i class="far fa-user"></i><i class="far fa-heart"></i><i class="fas fa-bag-shopping"></i>
    </div>
</nav>

<div class="page-header">
    <h1>The Journal</h1>
    <p>Stories from the intersection of craft and character</p>
</div>

<div class="journal-grid" id="journalGrid"></div>

<footer>
    <div class="footer-links">
        <a href="#">About INDI-GRADA</a><a href="#">Sustainability</a><a href="#">Shipping & Returns</a><a href="#">Warranty</a><a href="#">Contact</a>
    </div>
    <p style="color:#666;">© 2026 INDI-GRADA — Bold By Design</p>
</footer>

<script>
    const articles = [
        { date: "April 10, 2026", title: "The Making of Vanguard Carbon", excerpt: "How we forged a watch from aerospace-grade materials.", icon: "🔥", link: "#" },
        { date: "March 28, 2026", title: "Intrepid Sport: A New Era", excerpt: "Exploring the design philosophy behind our best-selling series.", icon: "⚡", link: "#" },
        { date: "March 15, 2026", title: "Craftsmanship in Every Link", excerpt: "Inside the workshop where jewelry becomes heirloom.", icon: "🔨", link: "#" },
        { date: "February 22, 2026", title: "The Collector's Eye", excerpt: "Three enthusiasts share their INDI-GRADA stories.", icon: "👁️", link: "#" },
        { date: "February 5, 2026", title: "Sustainable Luxury", excerpt: "Our commitment to ethical sourcing and timeless design.", icon: "🌱", link: "#" },
        { date: "January 18, 2026", title: "A Night at the Atelier", excerpt: "Behind the scenes of our first private showcase.", icon: "🥂", link: "#" }
    ];
    function renderJournal() {
        const grid = document.getElementById('journalGrid');
        grid.innerHTML = articles.map(a => `
            <div class="journal-card">
                <div class="journal-img"><span style="font-size:3rem;">${a.icon}</span></div>
                <div class="journal-content">
                    <div class="journal-date">${a.date}</div>
                    <div class="journal-title">${a.title}</div>
                    <div class="journal-excerpt">${a.excerpt}</div>
                    <a href="${a.link}" class="read-more">Read more →</a>
                </div>
            </div>
        `).join('');
    }
    renderJournal();
</script>
</body>
</html>
