<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* KEEP YOUR EXISTING GRID */
.products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 40px;
}

/* KEEP CARD STYLE */
.product-card {
    background: #111;
    border-radius: 12px;
    overflow: hidden;
}

/* EXISTING IMAGE CONTAINER (only added position) */
.image-container {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
}

/* KEEP IMAGE */
.product-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.4s ease;
}

/* ✅ ADDED VIDEO */
.hover-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
}

/* ✅ HOVER EFFECT */
.product-card:hover .hover-video {
    opacity: 1;
}

.product-card:hover .product-image {
    opacity: 0;
}

/* KEEP TEXT */
.product-info {
    padding: 10px;
}

.product-info h3 {
    margin: 0;
    font-size: 16px;
}
</style>
</head>

<body>

<section class="products">

<!-- WATCH 1 -->
<div class="product-card">
    <div class="image-container">
        <img src="images/watch1.jpg" class="product-image">

        <!-- ✅ VIDEO ADDED -->
        <video class="hover-video" muted loop preload="none">
            <source src="136967-765457958_medium.mp4" type="video/mp4">
        </video>
    </div>
    <div class="product-info">
        <h3>Watch 1</h3>
    </div>
</div>

<!-- WATCH 2 -->
<div class="product-card">
    <div class="image-container">
        <img src="images/watch2.jpg" class="product-image">

        <video class="hover-video" muted loop preload="none">
            <source src="3019-165457954_medium.mp4" type="video/mp4">
        </video>
    </div>
    <div class="product-info">
        <h3>Watch 2</h3>
    </div>
</div>

<!-- WATCH 3 -->
<div class="product-card">
    <div class="image-container">
        <img src="images/watch3.jpg" class="product-image">

        <video class="hover-video" muted loop preload="none">
            <source src="34855-403777679_medium.mp4" type="video/mp4">
        </video>
    </div>
    <div class="product-info">
        <h3>Watch 3</h3>
    </div>
</div>

<!-- WATCH 4 -->
<div class="product-card">
    <div class="image-container">
        <img src="images/watch4.jpg" class="product-image">

        <video class="hover-video" muted loop preload="none">
            <source src="39863-425400884_medium.mp4" type="video/mp4">
        </video>
    </div>
    <div class="product-info">
        <h3>Watch 4</h3>
    </div>
</div>

</section>

<!-- ✅ ONLY NEW JS -->
<script>
document.querySelectorAll('.product-card').forEach(card => {
    const video = card.querySelector('.hover-video');

    card.addEventListener('mouseenter', () => {
        if (video) {
            video.currentTime = 0;
            video.play();
        }
    });

    card.addEventListener('mouseleave', () => {
        if (video) {
            video.pause();
            video.currentTime = 0;
        }
    });
});
</script>

</body>
</html>
