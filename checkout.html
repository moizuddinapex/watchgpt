<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDI-GRADA | Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #eaeaea; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { margin-bottom: 2rem; color: #c6a43f; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
        .cart-items { background: #111; border-radius: 16px; padding: 1.5rem; border: 1px solid #222; }
        .cart-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid #222; }
        .cart-total { margin-top: 1rem; padding-top: 1rem; font-size: 1.2rem; font-weight: bold; border-top: 2px solid #c6a43f; }
        .checkout-form { background: #111; border-radius: 16px; padding: 1.5rem; border: 1px solid #222; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.8rem; color: #aaa; }
        input, select { width: 100%; padding: 0.8rem; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: #c6a43f; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { background: #c6a43f; color: #0a0a0a; border: none; padding: 1rem; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 1rem; }
        .btn:hover { background: #d4b347; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: #c6a43f; text-decoration: none; }
        @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Back to Shopping</a>
    <h1>Checkout</h1>
    <div class="checkout-grid">
        <div class="cart-items" id="cartItems">
            <h3>Your Cart</h3>
            <div id="cartList"></div>
            <div class="cart-total" id="cartTotal">Total: HK$0</div>
        </div>
        <div class="checkout-form">
            <h3>Shipping Information</h3>
            <form id="checkoutForm">
                <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Address</label><input type="text" id="address" required></div>
